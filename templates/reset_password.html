{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="login-container">
  <div class="login-card">
    <h2>Set New Password</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <div class="form-group">{{ form.new_password1.label_tag }} {{ form.new_password1 }}</div>
      <div class="form-group">{{ form.new_password2.label_tag }} {{ form.new_password2 }}</div>
      <br>
      <button type="submit" class="btn-login">Reset Password</button>
    </form>
  </div>
</div>
{% endblock %}
